services:
  - type: worker
    name: bot-reservas-deportes-madrid
    env: python
    plan: starter
    buildCommand: "pip install -r requirements.txt && playwright install --with-deps chromium"
    startCommand: "python bot.py"
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DEPORTES_USUARIO
        sync: false
      - key: DEPORTES_CONTRASENA
        sync: false
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
